{{ define "main" }}
<style>
  .assistant { padding: 2.4rem 2.8rem 3rem; max-width: calc(var(--maxw) + 5.6rem); }
  .assistant h1 {
    font-family: "Fraunces", Georgia, serif; font-weight: 600;
    font-size: clamp(1.6rem, 3.2vw, 2.2rem); line-height: 1.1; margin: 0;
  }
  .assistant-intro { color: var(--muted); margin: .5rem 0 0; max-width: 52ch; }
  .chat {
    border: 1px solid var(--line); border-radius: var(--r); background: #fff;
    padding: 1rem; margin-top: 1.4rem; height: min(60vh, 520px);
    overflow-y: auto; display: flex; flex-direction: column; gap: .8rem;
  }
  .msg {
    max-width: 85%; padding: .7rem .9rem; border-radius: 14px;
    white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.55; font-size: .97rem;
  }
  .msg--user { align-self: flex-end; background: var(--ink); color: #f3f1ec; border-bottom-right-radius: 4px; }
  .msg--bot { align-self: flex-start; background: #f6f2e9; color: var(--text); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg--error { align-self: center; background: #fdecec; color: #9d2235; border: 1px solid #f3c4c4; font-size: .9rem; }
  .msg.typing { color: var(--muted); font-style: italic; }
  .composer { display: flex; gap: .6rem; margin-top: .9rem; align-items: flex-end; }
  .composer textarea {
    flex: 1; resize: none; font: inherit; line-height: 1.5;
    padding: .65rem .8rem; border: 1px solid var(--line); border-radius: var(--r);
    background: #fff; max-height: 160px; min-height: 2.6rem;
  }
  .btn-send {
    font: inherit; font-weight: 600; cursor: pointer; border: 0; border-radius: var(--r);
    background: var(--gold); color: #1c1a16; padding: 0 1.3rem; height: 2.6rem;
  }
  .btn-send:disabled { opacity: .5; cursor: default; }
  .assistant-actions { display: flex; gap: .6rem; margin-top: .9rem; flex-wrap: wrap; }
  .ghost {
    font: inherit; font-size: .85rem; cursor: pointer; background: none;
    border: 1px solid var(--line); border-radius: var(--r); padding: .45rem .8rem; color: var(--muted);
  }
  .ghost:hover { color: var(--text); border-color: var(--gold); }
  @media (max-width: 900px) { .assistant { padding: 1.4rem; } }
</style>

<section class="assistant">
  <h1>Assistent</h1>
  <p class="assistant-intro">Et lite verktøy for å beskrive hva du ønsker på nettsiden. Skriv fritt, så stiller jeg noen spørsmål og lager et notat til Espen til slutt.</p>

  <div id="chat" class="chat" aria-live="polite" aria-label="Samtale"></div>

  <form id="composer" class="composer">
    <textarea id="input" rows="1" placeholder="Skriv her … (Enter sender, Shift+Enter ny linje)" autocomplete="off"></textarea>
    <button id="send" class="btn-send" type="submit">Send</button>
  </form>

  <div class="assistant-actions">
    <button id="handoff" type="button" class="ghost">Send til Espen</button>
    <button id="download" type="button" class="ghost">Last ned notat (.md)</button>
    <button id="copy" type="button" class="ghost">Kopier notat</button>
    <button id="reset" type="button" class="ghost">Start på nytt</button>
  </div>
</section>

<script>
  var WORKER_URL = "{{ .Site.Params.assistantWorkerURL | default "" }}";

  var chat = document.getElementById("chat");
  var form = document.getElementById("composer");
  var input = document.getElementById("input");
  var sendBtn = document.getElementById("send");

  var messages = [];   // {role, content} sent to the API
  var busy = false;

  function addBubble(role, text) {
    var el = document.createElement("div");
    var kind = role === "user" ? "msg--user" : role === "error" ? "msg--error" : "msg--bot";
    el.className = "msg " + kind;
    el.textContent = text;
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
    return el;
  }

  addBubble("bot", "Hei Siri! 🐾 Fortell meg hva du ønsker å endre eller legge til på nettsiden.\n\nEspen jobber forresten med en ny «Alle våre kull»-side. Når du har tid, mangler han litt info for å gjøre den ferdig:\n• mor, far og antall kattunger for hvert kull\n• fødselsdato for kullene C–I\n• hvilke kull som har fine bilder til et eget galleri\n\nBare nevn det du har – gjerne flere kull samtidig – så noterer jeg det til ham. Bildene laster du opp på «Last opp».\n\nVi nærmer oss også å sette siden live på din egen adresse (tokleperlen.no / .com). Da trenger Espen tre raske svar: hvor du styrer domenet i dag, hvilken adresse siden skal ligge på, og om vi kan flytte bort fra Webnode. Svar gjerne her – eller i skjemaet under «Overføring». (Ikke skriv passord eller koder her; det ordner Espen trygt direkte.)");

  function getCode() {
    var c = sessionStorage.getItem("assistant_code");
    if (!c) {
      c = window.prompt("Skriv inn koden for å bruke assistenten:") || "";
      if (c) sessionStorage.setItem("assistant_code", c);
    }
    return c;
  }

  function autoGrow() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  }

  async function send(text) {
    if (busy) return;
    if (!WORKER_URL) {
      addBubble("error", "Assistenten er ikke koblet til ennå (mangler Worker-URL).");
      return;
    }
    var code = getCode();
    if (!code) return;

    busy = true; sendBtn.disabled = true;
    messages.push({ role: "user", content: text });
    addBubble("user", text);

    var bot = addBubble("bot", "…");
    bot.classList.add("typing");

    try {
      var res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Access-Code": code },
        body: JSON.stringify({ messages: messages }),
      });

      if (!res.ok) {
        var msg = "Noe gikk galt. Prøv igjen.";
        try { var j = await res.json(); if (j && j.error) msg = j.error; } catch (e) {}
        if (res.status === 401) sessionStorage.removeItem("assistant_code");
        bot.remove();
        addBubble("error", msg);
        return;
      }

      bot.classList.remove("typing");
      bot.textContent = "";

      var acc = "";
      var reader = res.body.getReader();
      var dec = new TextDecoder();
      var buf = "";

      for (;;) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += dec.decode(chunk.value, { stream: true });
        var lines = buf.split("\n");
        buf = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var t = lines[i].trim();
          if (t.indexOf("data:") !== 0) continue;
          var data = t.slice(5).trim();
          if (!data || data === "[DONE]") continue;
          var obj;
          try { obj = JSON.parse(data); } catch (e) { continue; }
          if (obj.type === "content_block_delta" && obj.delta && obj.delta.type === "text_delta") {
            acc += obj.delta.text;
            bot.textContent = acc;
            chat.scrollTop = chat.scrollHeight;
          }
        }
      }

      if (!acc) {
        bot.remove();
        addBubble("error", "Tomt svar. Prøv igjen.");
      } else {
        messages.push({ role: "assistant", content: acc });
      }
    } catch (e) {
      bot.remove();
      addBubble("error", "Nettverksfeil. Sjekk tilkoblingen og prøv igjen.");
    } finally {
      busy = false; sendBtn.disabled = false; input.focus();
    }
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var v = input.value.trim();
    if (!v) return;
    input.value = "";
    autoGrow();
    send(v);
  });

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });
  input.addEventListener("input", autoGrow);

  // Find the most recent assistant message that actually contains the brief
  // (the system prompt writes it under "## Notat til Espen") and return it from
  // that heading onward. Returns "" if no brief has been produced yet.
  var BRIEF_MARKER = "Notat til Espen";
  function latestBrief() {
    for (var i = messages.length - 1; i >= 0; i--) {
      if (messages[i].role !== "assistant") continue;
      var c = messages[i].content;
      var idx = c.indexOf(BRIEF_MARKER);
      if (idx === -1) continue;
      // Back up to the "##" heading if present, so the file starts cleanly.
      var h = c.lastIndexOf("#", idx);
      return c.slice(h === -1 ? idx : h).trim();
    }
    return "";
  }

  var NO_BRIEF = "Det finnes ikke noe ferdig notat ennå. Fullfør samtalen — når assistenten skriver \"Notat til Espen\" kan du laste det ned.";

  document.getElementById("download").addEventListener("click", function () {
    var text = latestBrief();
    if (!text) { window.alert(NO_BRIEF); return; }
    var blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "notat-til-espen.md";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById("copy").addEventListener("click", async function () {
    var text = latestBrief();
    var btn = document.getElementById("copy");
    if (!text) { window.alert(NO_BRIEF); return; }
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = "Kopiert!";
      setTimeout(function () { btn.textContent = "Kopier notat"; }, 1500);
    } catch (e) { window.alert("Kunne ikke kopiere."); }
  });

  // Hand-off: send the finished note straight to Espen (lands in his innspill-oversikt).
  var INNSPILL_URL = "https://tokleperlen-innspill.espen-severinsen.workers.dev";
  function fullTranscript() {
    if (!messages.length) return "";
    var out = "Samtale med assistenten (intet ferdig notat ennå):\n\n";
    for (var i = 0; i < messages.length; i++) {
      out += (messages[i].role === "user" ? "Siri" : "Assistent") + ": " + messages[i].content + "\n\n";
    }
    return out.trim();
  }
  document.getElementById("handoff").addEventListener("click", async function () {
    var btn = document.getElementById("handoff");
    var text = latestBrief() || fullTranscript();
    if (!text) { window.alert("Det er ingenting å sende ennå – skriv litt med assistenten først."); return; }
    btn.disabled = true; btn.textContent = "Sender …";
    try {
      var res = await fetch(INNSPILL_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: "Assistent-notat — Siri", summary: text }),
      });
      var ok = false; try { var j = await res.json(); ok = j && j.success; } catch (e) {}
      if (res.ok && ok) {
        btn.textContent = "Sendt til Espen ✓";
        setTimeout(function () { btn.textContent = "Send til Espen"; btn.disabled = false; }, 2500);
      } else {
        btn.textContent = "Send til Espen"; btn.disabled = false;
        window.alert("Kunne ikke sende akkurat nå. Du kan laste ned notatet og sende det til Espen i stedet.");
      }
    } catch (e) {
      btn.textContent = "Send til Espen"; btn.disabled = false;
      window.alert("Nettverksfeil. Last gjerne ned notatet og send det til Espen.");
    }
  });

  document.getElementById("reset").addEventListener("click", function () {
    if (!window.confirm("Vil du starte samtalen på nytt?")) return;
    messages = [];
    chat.innerHTML = "";
    addBubble("bot", "Hei igjen! Hva ønsker du på nettsiden?");
    input.focus();
  });
</script>
{{ end }}
